<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- CPU chip body -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="#16213e" stroke="#FF8C00" stroke-width="2"/>

  <!-- CPU inner die -->
  <rect x="22" y="22" width="20" height="20" rx="2" fill="#0f3460" stroke="#FF8C00" stroke-width="1.5"/>

  <!-- Grid lines on die -->
  <line x1="28" y1="22" x2="28" y2="42" stroke="#FF8C00" stroke-width="0.6" opacity="0.5"/>
  <line x1="36" y1="22" x2="36" y2="42" stroke="#FF8C00" stroke-width="0.6" opacity="0.5"/>
  <line x1="22" y1="28" x2="42" y2="28" stroke="#FF8C00" stroke-width="0.6" opacity="0.5"/>
  <line x1="22" y1="36" x2="42" y2="36" stroke="#FF8C00" stroke-width="0.6" opacity="0.5"/>

  <!-- Pins - top -->
  <rect x="20" y="11" width="3" height="5" rx="1" fill="#FF8C00"/>
  <rect x="30" y="11" width="3" height="5" rx="1" fill="#FF8C00"/>
  <rect x="40" y="11" width="3" height="5" rx="1" fill="#FF8C00"/>

  <!-- Pins - bottom -->
  <rect x="20" y="48" width="3" height="5" rx="1" fill="#FF8C00"/>
  <rect x="30" y="48" width="3" height="5" rx="1" fill="#FF8C00"/>
  <rect x="40" y="48" width="3" height="5" rx="1" fill="#FF8C00"/>

  <!-- Pins - left -->
  <rect x="11" y="20" width="5" height="3" rx="1" fill="#FF8C00"/>
  <rect x="11" y="30" width="5" height="3" rx="1" fill="#FF8C00"/>
  <rect x="11" y="40" width="5" height="3" rx="1" fill="#FF8C00"/>

  <!-- Pins - right -->
  <rect x="48" y="20" width="5" height="3" rx="1" fill="#FF8C00"/>
  <rect x="48" y="30" width="5" height="3" rx="1" fill="#FF8C00"/>
  <rect x="48" y="40" width="5" height="3" rx="1" fill="#FF8C00"/>

  <!-- Center glow dot -->
  <circle cx="32" cy="32" r="3.5" fill="#FF8C00" opacity="0.9"/>
</svg>
